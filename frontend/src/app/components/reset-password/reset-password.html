<section class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="logo-icon">&#127793;</span>
      <h2>Choose a new password</h2>
      <p>Enter a new password for your account</p>
    </div>

    @if (linkInvalid()) {
      <div class="alert alert-error">
        This reset link is missing a token or email.
        <a routerLink="/forgot-password">Request a new link</a>.
      </div>
    } @else {
      @if (error()) {
        <div class="alert alert-error">{{ error() }}</div>
      }
      @if (success()) {
        <div class="alert alert-success">{{ success() }}</div>
        <p class="auth-footer">Redirecting to log in…</p>
      } @else {
        <form (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" [(ngModel)]="email" name="email" readonly />
          </div>

          <div class="form-group">
            <label for="password">New password</label>
            <input
              id="password"
              type="password"
              [(ngModel)]="password"
              name="password"
              placeholder="Min. 6 characters"
              required
            />
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm password</label>
            <input
              id="confirmPassword"
              type="password"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              placeholder="Repeat your password"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary btn-lg full-width" [disabled]="loading()">
            {{ loading() ? 'Saving...' : 'Update password' }}
          </button>
        </form>
      }
    }

    <p class="auth-footer">
      <a routerLink="/login">Back to log in</a>
    </p>
  </div>
</section>
