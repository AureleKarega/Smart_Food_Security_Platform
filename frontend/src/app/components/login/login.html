<section class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="logo-icon">&#127793;</span>
      <h2>Welcome Back</h2>
      <p>Log in to your ALU FoodShare account</p>
    </div>

    @if (error) {
      <div class="alert alert-error">{{ error }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="your.email@alustudent.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="btn btn-primary btn-lg full-width" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Log In' }}
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/register">Join Us</a>
    </p>
  </div>
</section>
