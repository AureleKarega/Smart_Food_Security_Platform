<section class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="logo-icon">&#127793;</span>
      <h2>Join ALU FoodShare</h2>
      <p>Create your account and start sharing</p>
    </div>

    @if (error()) {
      <div class="alert alert-error">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" type="text" [(ngModel)]="name" name="name" placeholder="Your full name" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="your.email@alustudent.com" required>
      </div>

      <div class="form-group">
        <label for="studentId">Student ID</label>
        <input id="studentId" type="text" [(ngModel)]="studentId" name="studentId" placeholder="Your ALU student ID" required>
      </div>

      <div class="form-group">
        <label>Account Type</label>
        <div class="role-options">
          <label class="role-option">
            <input type="radio" name="accountType" [(ngModel)]="accountType" value="client" />
            <span>Client</span>
          </label>
          <label class="role-option">
            <input type="radio" name="accountType" [(ngModel)]="accountType" value="administrator" />
            <span>Administrator</span>
          </label>
        </div>
      </div>

      @if (accountType === 'administrator') {
        <div class="form-group">
          <label for="adminSignupCode">Admin Sign-up Code</label>
          <input
            id="adminSignupCode"
            type="password"
            [(ngModel)]="adminSignupCode"
            name="adminSignupCode"
            placeholder="Enter admin sign-up code"
            required
          >
        </div>
      }

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="Min. 6 characters" required>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Repeat your password" required>
      </div>

      <button type="submit" class="btn btn-primary btn-lg full-width" [disabled]="loading()">
        {{ loading() ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Log In</a>
    </p>
  </div>
</section>
